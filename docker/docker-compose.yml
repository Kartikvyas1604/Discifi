version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: discifi
    ports:
      - 27017:27017
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 15s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - 6379:6379
    healthcheck:
      test: redis-cli ping
      interval: 15s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - 3000:3000
    environment:
      NODE_ENV: production
      DATABASE_URL: mongodb://mongodb:27017/discifi
      REDIS_URL: redis://redis:6379
      HELIUS_API_KEY: ${HELIUS_API_KEY}
      HELIUS_WEBHOOK_SECRET: ${HELIUS_WEBHOOK_SECRET}
      QUICKNODE_ENDPOINT: ${QUICKNODE_ENDPOINT}
      JWT_SECRET: ${JWT_SECRET}
      DEVICE_CA_CERTIFICATE: ${DEVICE_CA_CERTIFICATE}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:3000/v1/health || exit 1
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  mongodb_data:
